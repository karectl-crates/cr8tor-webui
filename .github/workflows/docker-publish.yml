name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'           
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from Git tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cr8tor-webui:latest
            ghcr.io/${{ github.repository }}/cr8tor-webui:${{ env.VERSION }}

      - name: Post build info
        run: |
          echo "Docker image pushed to:"
          echo "  ghcr.io/${{ github.repository }}/cr8tor-webui:latest"
          echo "  ghcr.io/${{ github.repository }}/cr8tor-webui:${{ env.VERSION }}"